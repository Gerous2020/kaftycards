<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KaftyCards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .alt-link {
            display: block;
            margin-top: 1rem;
            color: #94a3b8;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .alt-link:hover {
            color: white;
        }

        .demo-credentials {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            color: #ccc;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .demo-credentials h4 {
            margin: 0 0 8px 0;
            color: #fff;
        }

        .demo-credentials p {
            margin: 4px 0;
            font-family: monospace;
        }

        .demo-credentials small {
            display: block;
            margin-top: 8px;
            color: #fbbf24;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Welcome Back</h2>
        <form onsubmit="handleLogin(event)">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="signup.html" class="alt-link">Don't have an account? Sign Up</a>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // redirectIfLoggedIn(); // Removed to allow user switching
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const result = verifyLogin(email, password);
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message);
            }
        }
    </script>
    <div class="demo-credentials">
        <h4>Demo Accounts</h4>
        <p>demo@kaftycards.com</p>
        <p>checkith@design.com</p>
        <p>sarah@realestate.com</p>
        <p>tech@startup.io</p>
        <small>Password: password</small>
    </div>
</body>

</html>
