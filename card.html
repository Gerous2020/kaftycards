<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaftyCards - Digital Visiting Card</title>
    <link rel="icon" type="image/png" href="assets/thumbnail.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="theme-vip">

    <!-- Animated Background -->
    <div class="mesh-gradient"></div>

    <!-- Main Container -->
    <div id="app" class="app-container">
        <!-- Card Container -->
        <main id="card" class="card-container">
            <!-- Desktop Sidebar Wrapper (Sticky on PC) -->
            <div class="desktop-sidebar">
                <!-- Header Section (Now with Hero Image and Logo) -->
                <header class="card-header" id="heroSection">
                    <div class="banner-overlay"></div>

                    <!-- Corner Contact Info (Small) -->
                    <div class="hero-corner-contact">
                        <div class="mini-contact-item">
                            <i data-lucide="phone" style="width: 12px; height: 12px;"></i>
                            <span id="headerPhone"></span>
                        </div>
                        <div class="mini-contact-item">
                            <i data-lucide="map-pin" style="width: 12px; height: 12px;"></i>
                            <span id="address"></span>
                        </div>
                    </div>

                    <!-- Company Logo Wrapper -->
                    <div class="logo-wrapper">
                        <img id="companyLogo" src="https://via.placeholder.com/150" alt="Company Logo"
                            class="company-logo">
                    </div>
                    <div class="header-content">
                        <h1 id="companyName" class="company-name-large"></h1>
                        <p id="businessType" class="business-tag"></p>

                        <!-- Owner Mini Profile -->
                        <div class="owner-mini-profile">
                            <img id="ownerImage" src="" alt="Owner" class="owner-avatar">
                            <div class="owner-info">
                                <h2 id="fullName" class="owner-name"></h2>
                                <p id="designation" class="owner-role"></p>
                            </div>
                        </div>
                    </div>
                </header>

                <!-- Download Actions Bar -->
                <div class="hero-actions-bar">
                    <button onclick="downloadHeroCard()" class="btn-download-hero-bar" title="Download Card Image">
                        <i data-lucide="image-down"></i> <span>Save Card Image</span>
                    </button>
                </div>

                <!-- Action Buttons Stack -->
                <section class="actions-stack" id="actionButtons">
                    <!-- Injected via JS -->
                </section>

                <!-- Save & QR Actions -->
                <div class="save-contact-area">
                    <div style="display: flex; gap: 1rem;">
                        <button onclick="downloadVCard()" class="btn-primary-glass" style="flex: 2;">
                            <i data-lucide="user-plus"></i> Save Contact
                        </button>
                        <button onclick="openQRModal()" class="btn-primary-glass" style="flex: 1; min-width: 60px;">
                            <i data-lucide="qr-code"></i>
                        </button>
                    </div>
                </div>

                <!-- Copyright Footer -->
                <div class="footer-copyright">
                    &copy; 2025 Kafty Cards. All rights reserved.
                </div>
            </div>

            <!-- Desktop Content Wrapper (Scrollable) -->
            <div class="desktop-content">
                <!-- Dynamic About Section -->
                <section class="content-section card-block" id="aboutSection">
                    <!-- Injected Blocks -->
                </section>

                <!-- Dynamic Services Section -->
                <section class="content-section card-block" id="servicesSection">
                    <h2 class="block-title">Our Services</h2>
                    <div id="servicesList" class="services-grid">
                        <!-- Injected Service Cards -->
                    </div>
                </section>

                <!-- New Gallery Section -->
                <section class="content-section card-block" id="gallerySection">
                    <h2 class="block-title">Gallery</h2>
                    <div id="galleryGrid" class="gallery-grid">
                        <!-- Injected Images -->
                    </div>
                </section>

                <!-- Social Links -->
                <section class="social-section card-block">
                    <h2 class="block-title">Connect</h2>
                    <div id="socialLinks" class="social-icons block-content">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <!-- Feedback Section -->
                <section class="content-section card-block" id="feedbackSection">
                    <h2 class="block-title">Rate My Service</h2>
                    <div class="feedback-container">
                        <p class="feedback-hint">How was your experience?</p>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5" /><label for="star5"
                                title="5 stars"><i data-lucide="star"></i></label>
                            <input type="radio" id="star4" name="rating" value="4" /><label for="star4"
                                title="4 stars"><i data-lucide="star"></i></label>
                            <input type="radio" id="star3" name="rating" value="3" /><label for="star3"
                                title="3 stars"><i data-lucide="star"></i></label>
                            <input type="radio" id="star2" name="rating" value="2" /><label for="star2"
                                title="2 stars"><i data-lucide="star"></i></label>
                            <input type="radio" id="star1" name="rating" value="1" /><label for="star1"
                                title="1 star"><i data-lucide="star"></i></label>
                        </div>
                        <div class="feedback-form">
                            <input type="text" id="feedbackName" class="feedback-input"
                                placeholder="Your Name (Optional)">
                            <textarea id="feedbackMsg" class="feedback-input"
                                placeholder="Write your review here..."></textarea>
                            <button onclick="sendFeedback()" class="btn-primary-glass"
                                style="width:100%; margin-top:10px;">
                                <i data-lucide="send"></i> Send Feedback
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Sticky Navigation Bar -->
        <div class="sticky-nav">
            <a href="#" class="nav-item active">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="#aboutSection" class="nav-item">
                <i data-lucide="info"></i>
                <span>About</span>
            </a>

            <div class="fab-wrapper">
                <button class="fab-btn" onclick="shareCard()">
                    <i data-lucide="share-2"></i>
                </button>
            </div>

            <a href="#servicesSection" class="nav-item">
                <i data-lucide="layers"></i>
                <span>Services</span>
            </a>
            <a href="#gallerySection" class="nav-item">
                <i data-lucide="image"></i>
                <span>Gallery</span>
            </a>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-modal" onclick="closeQRModal()"><i data-lucide="x"></i></button>
            <h3>Scan to Save</h3>
            <div id="qrPlaceholder"></div>
            <p>Share this card with anyone!</p>
            <button onclick="downloadQR()" class="btn-secondary">Download QR</button>
        </div>
    </div>

    <!-- QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- HTML2Canvas for Image Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
