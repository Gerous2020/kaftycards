<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaftyCards - Create Your Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #3b82f6, #f59e0b);
            /* -webkit-background-clip: text; */
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            max-width: 600px;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .btn {
            padding: 15px 30px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 20px;
        }

        .links a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        .links a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>KaftyCards</h1>
    <p>The modern way to share your professional identity. Create, customize, and share your digital visiting card in
        minutes.</p>
    <a href="signup.html" class="btn">Create Your Card</a>

    <div class="links">
        <a href="login.html">Login</a>
        <a href="card.html">View Demo Card</a>
    </div>
</body>

</html>
